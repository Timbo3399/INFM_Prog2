name: C/C++ style check

on: [push, pull_request]

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format cppcheck python3
      - name: Run clang-format check
        run: |
          find . -name "*.c" -o -name "*.h" | xargs -r clang-format --style=file --dry-run --Werror
      - name: Run cppcheck
        run: |
          cppcheck --enable=all --std=c99 . || true
      - name: Run custom style checks
        run: |
          python3 .github/scripts/check_style.py || true
